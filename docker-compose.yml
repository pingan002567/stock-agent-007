# ===========================
# Stock Agent Docker Compose
# ===========================

services:
  stock-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock-agent
    ports:
      - "6666:6666"
    volumes:
      # Persist data and logs
      - ./data:/app/data
      - ./log:/app/log
      # Mount .env file for configuration
      - ./.env:/app/.env:ro
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6666/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  stock-agent-data:
    driver: local
  stock-agent-log:
    driver: local
